name: Scraping Licitaciones

on:
  schedule:
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scraping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y firefox-geckodriver firefox
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python main.py
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
